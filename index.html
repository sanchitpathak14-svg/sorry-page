
<!DOCTYPE html>
<html>
<head>
<title>A small question</title>

<style>

body{
font-family:Arial;
text-align:center;
background:linear-gradient(135deg,#ff9a9e,#fad0c4);
height:100vh;
display:flex;
justify-content:center;
align-items:center;
color:white;
margin:0;
overflow:hidden;
}

.box{
background:rgba(0,0,0,0.35);
padding:60px;
border-radius:25px;
max-width:560px;
position:relative;
z-index:2;
}

h2{
font-size:32px;
}

p{
font-size:22px;
line-height:1.6;
}

.buttons{
position:relative;
height:150px;
margin-top:20px;
}

button{
padding:15px 35px;
font-size:20px;
border:none;
border-radius:12px;
cursor:pointer;
position:absolute;
transition:0.25s;
}

#yes{
background:#ff4d6d;
color:white;
left:25%;
top:40px;
}

#no{
background:white;
color:black;
left:65%;
top:40px;
}

#celebration{
font-size:40px;
margin-top:20px;
display:none;
}

/* floating hearts */

.heart{
position:fixed;
animation:floatUp 6s linear infinite;
pointer-events:none;
}

@keyframes floatUp{
0%{transform:translateY(100vh);opacity:1;}
100%{transform:translateY(-10vh);opacity:0;}
}

/* explosion hearts */

.burst{
position:fixed;
font-size:24px;
pointer-events:none;
animation:burst 1.5s forwards;
}

@keyframes burst{
0%{
transform:translate(0,0) scale(1);
opacity:1;
}
100%{
transform:translate(var(--x),var(--y)) scale(1.8);
opacity:0;
}
}

</style>
</head>

<body>

<div class="box">

<h2>Sushrita, a small question for you…</h2>

<p>
I know I made mistakes and probably annoyed you more than I should have 🙈  
I'm really sorry.  
I can't change the past… but I promise I'll do better from now on.
<br><br>
Can you forgive me? 🥺❤️
</p>

<div class="buttons">

<button id="yes" onclick="accepted()">YES ❤️</button>
<button id="no" onclick="move()">🫣 No</button>

</div>

<p id="response"></p>

<div id="celebration">
🎉🥳💖🎊✨💃
</div>

</div>

<script>

let noClicks = 0;

function move(){

noClicks++;

let btn=document.getElementById("no");
let msg=document.getElementById("response");

let x=Math.random()*220-110;
let y=Math.random()*90-45;

btn.style.transform=`translate(${x}px,${y}px)`;

if(noClicks===1){
msg.innerHTML="Hmm… are you sure about that? 🤨";
}

else if(noClicks===2){
msg.innerHTML="Think carefully… this might hurt my feelings 🥲";
}

else if(noClicks===3){

msg.innerHTML="Hmm I know what you are doing 😏<br>Now what will you do?";

btn.innerHTML="Okay fine, Yes 😌";

btn.onclick=accepted;

}

}

function accepted(){

document.getElementById("response").innerHTML=
"Yaaayyyyy!! 🥳🎉❤️<br>That's my girl! 😌💖<br>I love you so much 😘💕";

document.getElementById("celebration").style.display="block";

document.getElementById("yes").style.display="none";
document.getElementById("no").style.display="none";

/* heart explosion */

for(let i=0;i<25;i++){

let heart=document.createElement("div");
heart.className="burst";
heart.innerHTML="❤️";

let x=(Math.random()*400)-200;
let y=(Math.random()*400)-200;

heart.style.setProperty("--x",x+"px");
heart.style.setProperty("--y",y+"px");

heart.style.left="50%";
heart.style.top="50%";

document.body.appendChild(heart);

setTimeout(()=>{
heart.remove();
},1500);

}

}

/* floating hearts */

setInterval(function(){

const heart=document.createElement("div");
heart.className="heart";

const hearts=["❤️","💓","💖","💗","💕"];
heart.innerHTML=hearts[Math.floor(Math.random()*hearts.length)];

heart.style.left=Math.random()*100+"vw";
heart.style.fontSize=(20+Math.random()*20)+"px";

document.body.appendChild(heart);

setTimeout(()=>{
heart.remove();
},6000);

},500);

</script>

</body>
</html>
